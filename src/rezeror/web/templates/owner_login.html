{% extends "base.html" %}

{% block title %}Owner Login - Rezeror{% endblock %}

{% block content %}
<section class="reader-wrap" style="max-width: 520px; margin: 2rem auto;">
  <article class="reader-content prose">
    <h1>Owner Login</h1>
    {% if error %}
      <p class="meta" style="color: #b42318;">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('owner_login_submit') }}">
      <input type="hidden" name="next" value="{{ next_path }}">
      <p>
        <label for="owner-username">Username</label><br>
        <input id="owner-username" name="username" type="text" required>
      </p>
      <p>
        <label for="owner-password">Password</label><br>
        <input id="owner-password" name="password" type="password" required>
      </p>
      <p>
        <button class="btn" type="submit">Login</button>
      </p>
    </form>
  </article>
</section>
{% endblock %}
