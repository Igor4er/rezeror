<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <meta name="darkreader-lock">
    <meta name="csrf-token" content="{{ owner_csrf_token }}">
    <title>{% block title %}Rezeror{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="{{ url_for('library') }}">Rezeror</a>
        <div class="site-header-title">{% block header_title %}{% endblock %}</div>
        <nav class="site-header-auth" aria-label="Owner authentication">
        {% if session.get('is_owner') %}
          <form method="post" action="{{ url_for('owner_logout') }}">
            <input type="hidden" name="csrf_token" value="{{ owner_csrf_token }}">
            <button class="btn btn-sm owner-auth-btn" type="submit">Owner Logout</button>
          </form>
        {% else %}
          <a class="btn btn-sm owner-auth-btn" href="{{ url_for('owner_login_form', next=request.path) }}">Owner Login</a>
        {% endif %}
        </nav>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
