<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Rezeror{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('library') }}">Rezeror</a>
      <nav>
        {% if session.get('is_owner') %}
          <form method="post" action="{{ url_for('owner_logout') }}">
            <button class="btn" type="submit">Owner Logout</button>
          </form>
        {% else %}
          <a class="btn" href="{{ url_for('owner_login_form', next=request.path) }}">Owner Login</a>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
